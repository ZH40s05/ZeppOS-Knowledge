version: 1
snapshot_date: 2026-07-03
policy:
  strategy: version-snapshot
  copy_rules:
    - Do not copy .git directories.
    - Do not copy node_modules, dist, build, .docusaurus, .cache, or .zpk files.
    - Keep upstream licenses and notices.
    - Do not edit vendored official or third-party snapshots directly.
    - Write explanations and local conclusions to self-knowledge.

